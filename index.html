<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>NFT Preview Card - Frontend Mentor Challenge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="img-container">
        <img src="images/image-equilibrium.jpg" alt="equilibrium" />
        <div class="overlay">
          <img src="images/icon-view.svg" alt="view icon" />
        </div>
      </div>
      <div class="texts">
        <h1>Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
      </div>
      <div class="times">
        <div class="eth">
          <img src="images/icon-ethereum.svg" alt="ethereum" />
          <span>0.041 ETH</span>
        </div>
        <div class="time">
          <img src="images/icon-clock.svg" alt="clock" />
          <span>3 days left</span>
        </div>
      </div>
      <hr />
      <div class="avatar">
        <img src="images/image-avatar.png" alt="Jules Wyvern" />
        <p>Creation of <span>Jules Wyvern</span></p>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/nft-preview-card-component-SbdUL_w0U"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/withsarath">Sarath ❤️</a>.
    </div>
  </body>
</html>
